<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE - Mission Impossible</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d; --text-color: #f2f2f2; --red-main: #d30000;
            --red-dark: #8a0000; --grid-bg: #1a1a1a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Roboto', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow: hidden; padding-top: 20px;}
        header { text-align: center; margin-bottom: 20px; }
        .btn-retour { display: inline-block; color: var(--text-color); text-decoration: none; font-family: 'Oswald', sans-serif; padding: 5px 10px; border: 1px solid var(--red-dark); border-radius: 4px; transition: 0.3s; margin-bottom: 15px;}
        .btn-retour:hover { background: var(--red-main); }
        .logo { font-family: 'Oswald', sans-serif; font-size: 2.5rem; letter-spacing: 2px; color: var(--red-main); margin-bottom:0;}
        .score { font-family: 'Oswald', sans-serif; font-size: 1.5rem; margin-top: 5px; }
        canvas { background: var(--grid-bg); border: 2px solid var(--red-dark); box-shadow: 0 0 15px rgba(211, 0, 0, 0.3); border-radius: 8px; max-width: 95vw; touch-action:none;}
        .mobile-controls { border-radius: 50%; width: 140px; height: 140px; background: #111; margin-top: 20px; position:relative; overflow:hidden;}
        .ctrl-up, .ctrl-down, .ctrl-left, .ctrl-right { position:absolute; background:rgba(211,0,0,0.2); backdrop-filter:blur(2px); cursor:pointer;}
        .ctrl-up { top:0; left:35%; width:30%; height:35%; border-radius:0 0 50% 50%;}
        .ctrl-down { bottom:0; left:35%; width:30%; height:35%; border-radius:50% 50% 0 0;}
        .ctrl-left { top:35%; left:0; width:35%; height:30%; border-radius:0 50% 50% 0;}
        .ctrl-right { top:35%; right:0; width:35%; height:30%; border-radius:50% 0 0 50%;}
        .ctrl-up:active, .ctrl-down:active, .ctrl-left:active, .ctrl-right:active { background:rgba(211,0,0,0.6);}
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; }
        .hidden { display: none !important; }
        .btn-action { background: var(--red-dark); color: #fff; border: none; padding: 12px 20px; font-family: 'Oswald', sans-serif; font-size: 1.2rem; cursor: pointer; border-radius: 4px; margin-top: 20px;}
        .joystick-hint { font-size: 0.8rem; color: #888; text-transform: uppercase; margin-top:5px; margin-bottom:5px;}
    </style>
</head>
<body>
    <header>
        <a href="../index.html#arcade" class="btn-retour">⬅ RETOUR AU QG</a>
        <h1 class="logo">SNAKE: OPÉRATION OUROBOROS</h1>
        <div class="score">DONNÉES: <span id="scoreVal">0</span> MB</div>
    </header>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    
    <div class="joystick-hint">PILOTAGE TACTILE / CLAVIER</div>
    <div class="mobile-controls">
        <div class="ctrl-up" id="btn-up"></div>
        <div class="ctrl-down" id="btn-down"></div>
        <div class="ctrl-left" id="btn-left"></div>
        <div class="ctrl-right" id="btn-right"></div>
    </div>

    <div id="overlay" class="hidden">
        <h2 style="color:var(--red-main); font-family:'Oswald', sans-serif; font-size:3rem; margin-bottom:10px;">LIAISON PERDUE</h2>
        <p>Données extraites : <span id="finalScore">0</span> MB</p>
        <button class="btn-action" onclick="resetGame()">RELANCER LA CONNEXION</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("scoreVal");

        let frames = 0;
        let isMobile = window.innerWidth < 450;
        if(isMobile) { canvas.width = 320; canvas.height = 320; }

        let snake = {
            path: [],
            head: { x: canvas.width/2, y: canvas.height/2 },
            dx: 1, dy: 0,
            speed: isMobile ? 1.5 : 2.5,
            baseLen: 40,
            radius: 8,
            draw: function() {
                if(this.path.length < 2) return;
                
                // Draw Body
                ctx.beginPath();
                ctx.moveTo(this.path[0].x, this.path[0].y);
                for(let i=1; i<this.path.length; i++) {
                    ctx.lineTo(this.path[i].x, this.path[i].y);
                }
                ctx.strokeStyle = '#8a0000';
                ctx.lineWidth = this.radius * 2;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.shadowBlur = 10; ctx.shadowColor = '#d30000';
                ctx.stroke();
                ctx.shadowBlur = 0;

                // Draw Head specific
                ctx.fillStyle = '#ff3333';
                ctx.beginPath();
                ctx.arc(this.head.x, this.head.y, this.radius, 0, Math.PI*2);
                ctx.fill();
            },
            update: function() {
                this.head.x += this.dx * this.speed;
                this.head.y += this.dy * this.speed;
                
                this.path.unshift({x: this.head.x, y: this.head.y});

                while(this.path.length > this.baseLen) {
                    this.path.pop();
                }
            }
        };

        let food = { x: 0, y: 0, radius: 8 };

        function spawnFood() {
            let margin = 20;
            food.x = margin + Math.random() * (canvas.width - margin*2);
            food.y = margin + Math.random() * (canvas.height - margin*2);
        }
        spawnFood();

        let score = 0;
        let isGameOver = false;

        document.addEventListener("keydown", (e) => {
            if(['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
            if(e.key === "ArrowLeft" && snake.dx === 0) { snake.dx = -1; snake.dy = 0; }
            if(e.key === "ArrowUp" && snake.dy === 0) { snake.dx = 0; snake.dy = -1; }
            if(e.key === "ArrowRight" && snake.dx === 0) { snake.dx = 1; snake.dy = 0; }
            if(e.key === "ArrowDown" && snake.dy === 0) { snake.dx = 0; snake.dy = 1; }
        });

        // Tactile
        const handleDir = (dx, dy) => {
            if(dx !== 0 && snake.dx === 0) { snake.dx = dx; snake.dy = dy; }
            if(dy !== 0 && snake.dy === 0) { snake.dx = dx; snake.dy = dy; }
        }
        document.getElementById("btn-left").addEventListener("touchstart", (e)=>{e.preventDefault(); handleDir(-1,0);});
        document.getElementById("btn-up").addEventListener("touchstart", (e)=>{e.preventDefault(); handleDir(0,-1);});
        document.getElementById("btn-right").addEventListener("touchstart", (e)=>{e.preventDefault(); handleDir(1,0);});
        document.getElementById("btn-down").addEventListener("touchstart", (e)=>{e.preventDefault(); handleDir(0,1);});

        // Swipe tactile
        let touchStartX = 0;
        let touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                if (Math.abs(dx) > 30) {
                    if (dx > 0) handleDir(1, 0); // droite
                    else handleDir(-1, 0); // gauche
                }
            } else {
                if (Math.abs(dy) > 30) {
                    if (dy > 0) handleDir(0, 1); // bas
                    else handleDir(0, -1); // haut
                }
            }
        }, {passive: false});

        // Prevent canvas swipe scrolling
        canvas.addEventListener('touchmove', e => e.preventDefault(), {passive:false});

        function isCollision() {
            // Walls
            if(snake.head.x < snake.radius || snake.head.x > canvas.width - snake.radius || snake.head.y < snake.radius || snake.head.y > canvas.height - snake.radius) {
                return true;
            }
            // Self
            // On ignore les 15 premiers points de path (qui sont très proches de la tête)
            for(let i=15; i<snake.path.length; i++) {
                let dx = snake.head.x - snake.path[i].x;
                let dy = snake.head.y - snake.path[i].y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < snake.radius) return true;
            }
            return false;
        }

        function checkFood() {
            let dx = snake.head.x - food.x;
            let dy = snake.head.y - food.y;
            if(Math.sqrt(dx*dx + dy*dy) < snake.radius + food.radius) {
                score += 10;
                scoreEl.innerText = score;
                snake.baseLen += 15; // Allonge le serpent
                spawnFood();
            }
        }

        function draw() {
            ctx.fillStyle = "rgba(26, 26, 26, 0.4)"; // Trace discrète
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Dessin Nourriture
            ctx.fillStyle = "#fff";
            ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
            ctx.beginPath();
            ctx.arc(food.x, food.y, food.radius, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;

            if(!isGameOver) {
                snake.update();
                checkFood();
                if(isCollision()) {
                    isGameOver = true;
                    document.getElementById('overlay').classList.remove('hidden');
                    document.getElementById('finalScore').innerText = score;
                }
            }

            snake.draw();
        }

        function resetGame() {
            snake.path = [];
            snake.head = { x: canvas.width/2, y: canvas.height/2 };
            snake.dx = 1; snake.dy = 0;
            snake.baseLen = 40;
            score = 0;
            scoreEl.innerText = score;
            spawnFood();
            document.getElementById('overlay').classList.add('hidden');
            isGameOver = false;
        }

        function loop() {
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
